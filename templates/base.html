<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Diet Planner{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 0; background: #f5f5f5; color: #222; }
    nav { background: #2c3e50; padding: .75rem 1.5rem; display: flex; gap: 1.5rem; align-items: center; }
    nav a { color: #ecf0f1; text-decoration: none; font-size: .95rem; }
    nav a:hover { text-decoration: underline; }
    nav .brand { font-weight: 700; font-size: 1.1rem; margin-right: auto; }
    main { padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
    h1 { margin-top: 0; }
    table { border-collapse: collapse; width: 100%; background: #fff; }
    th, td { border: 1px solid #ddd; padding: .5rem .75rem; text-align: left; }
    th { background: #eee; }
    .btn { display: inline-block; padding: .4rem .9rem; border-radius: 4px; border: none;
           cursor: pointer; font-size: .9rem; text-decoration: none; }
    .btn-primary { background: #2980b9; color: #fff; }
    .btn-primary:hover { background: #1f6fa5; }
    .btn:disabled { background: #b0bec5; color: #fff; cursor: not-allowed; }
    .btn-danger { background: #c0392b; color: #fff; }
    .btn-danger:hover { background: #a93226; }
    .btn-sm { padding: .25rem .6rem; font-size: .8rem; }
    input, select { padding: .4rem .6rem; border: 1px solid #ccc; border-radius: 4px; font-size: .9rem; }
    .error { color: #c0392b; margin-bottom: 1rem; }
    .card { background: #fff; border: 1px solid #ddd; border-radius: 6px; padding: 1rem 1.25rem; margin-bottom: 1rem; }
    .macro-row { display: flex; gap: 1.5rem; font-size: .9rem; }
    .macro-item label { font-weight: 600; }
    @media print { nav { display: none; } }
  </style>
</head>
<body>
<nav>
  <span class="brand">Diet Planner</span>
  <a href="{{ url_for('plan_view') }}">Plan</a>
  <a href="{{ url_for('recipes_index') }}">Recipes</a>
  <a href="{{ url_for('ingredients_index') }}">Ingredients</a>
  <a href="{{ url_for('plan_print') }}" target="_blank">Print</a>
</nav>
<main>
  {% block content %}{% endblock %}
</main>
</body>
</html>
