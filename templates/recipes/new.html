{% extends 'base.html' %}
{% block title %}New Recipe — Diet Planner{% endblock %}
{% block content %}
<h1>New Recipe</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" action="{{ url_for('recipes_new') }}" style="max-width:400px">
  <label>Recipe name *</label><br>
  <input name="name" required style="width:100%;margin-top:.25rem">
  <button class="btn btn-primary" type="submit" style="margin-top:.75rem">Create</button>
  <a href="{{ url_for('recipes_index') }}" style="margin-left:1rem">Cancel</a>
</form>
{% endblock %}
