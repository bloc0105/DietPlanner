{% extends 'base.html' %}
{% block title %}Edit Ingredient — Diet Planner{% endblock %}
{% block content %}
<h1>Edit: {{ ingredient.name }}</h1>
{% if error %}<p class="error">{{ error }}</p>{% endif %}
<form method="post" style="max-width:500px">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
    <div style="grid-column:1/-1">
      <label>Name *</label><br>
      <input name="name" value="{{ ingredient.name }}" required style="width:100%">
    </div>
    <div style="grid-column:1/-1">
      <label>UPC</label><br>
      <input name="upc" value="{{ ingredient.upc or '' }}" style="width:100%">
    </div>
    <div>
      <label>Serving size</label><br>
      <input name="serving_size" type="number" step="any" value="{{ ingredient.serving_size or '' }}" style="width:100%">
    </div>
    <div>
      <label>Unit</label><br>
      <input name="serving_unit" value="{{ ingredient.serving_unit or 'g' }}" style="width:100%">
    </div>
    <div><label>kcal / 100g</label><br><input name="kcal" type="number" step="any" value="{{ ingredient.kcal or '' }}" style="width:100%"></div>
    <div><label>Protein / 100g (g)</label><br><input name="protein" type="number" step="any" value="{{ ingredient.protein or '' }}" style="width:100%"></div>
    <div><label>Fat / 100g (g)</label><br><input name="fat" type="number" step="any" value="{{ ingredient.fat or '' }}" style="width:100%"></div>
    <div><label>Carbs / 100g (g)</label><br><input name="carbs" type="number" step="any" value="{{ ingredient.carbs or '' }}" style="width:100%"></div>
    <div><label>Fiber / 100g (g)</label><br><input name="fiber" type="number" step="any" value="{{ ingredient.fiber or '' }}" style="width:100%"></div>
  </div>
  <button class="btn btn-primary" type="submit" style="margin-top:1rem">Save</button>
  <a href="{{ url_for('ingredients_index') }}" style="margin-left:1rem">Cancel</a>
</form>
{% endblock %}
